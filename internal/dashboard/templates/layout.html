<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pali Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Pali Dashboard</h1>
      <nav>
        <a href="/dashboard/memories" class="{{if eq .Page "memories"}}active{{end}}">Memories</a>
        <a href="/dashboard/tenants" class="{{if eq .Page "tenants"}}active{{end}}">Tenants</a>
        <a href="/dashboard/stats" class="{{if eq .Page "stats"}}active{{end}}">Stats</a>
      </nav>
    </header>
    <main>
      {{ if .Error }}<p class="alert alert-error">{{ .Error }}</p>{{ end }}
      {{ if .Info }}<p class="alert alert-info">{{ .Info }}</p>{{ end }}
      {{ template "content" . }}
    </main>
    <script src="/static/js/htmx.min.js"></script>
  </body>
</html>
