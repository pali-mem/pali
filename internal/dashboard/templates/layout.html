<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pali Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-lockup">
          <p class="brand-kicker">Open memory infrastructure</p>
          <h1>Pali</h1>
        </div>
        <nav class="sidebar-nav" aria-label="Primary">
          <a href="/dashboard/stats" class="nav-link {{if eq .Page "stats"}}active{{end}}">
            <span class="nav-eyebrow">01</span>
            <span>Dashboard</span>
          </a>
          <a href="/dashboard/memories" class="nav-link {{if eq .Page "memories"}}active{{end}}">
            <span class="nav-eyebrow">02</span>
            <span>Memories</span>
          </a>
          <a href="/dashboard/tenants" class="nav-link {{if eq .Page "tenants"}}active{{end}}">
            <span class="nav-eyebrow">03</span>
            <span>Tenants</span>
          </a>
          <a href="/dashboard/analytics" class="nav-link {{if eq .Page "analytics"}}active{{end}}">
            <span class="nav-eyebrow">04</span>
            <span>Analytics</span>
          </a>
          <a href="/dashboard/config" class="nav-link {{if eq .Page "config"}}active{{end}}">
            <span class="nav-eyebrow">05</span>
            <span>Config</span>
          </a>
        </nav>
      </aside>
      <main class="main-content">
        <div class="dashboard-topbar">
          <div class="dashboard-topbar-actions">
            <a class="button-link dashboard-topbar-link" href="https://github.com/pali-mem/pali" target="_blank" rel="noreferrer">GitHub</a>
            <a class="button-link dashboard-topbar-link" href="https://pali-mem.github.io/pali/" target="_blank" rel="noreferrer">Docs</a>
          </div>
        </div>
        {{ if .Error }}<p class="alert alert-error">{{ .Error }}</p>{{ end }}
        {{ if .Info }}<p class="alert alert-info">{{ .Info }}</p>{{ end }}
        {{ template "content" . }}
      </main>
    </div>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/dashboard_analytics.js"></script>
  </body>
</html>
