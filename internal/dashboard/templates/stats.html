{{ define "content" }}
<section>
  <h2>Stats</h2>
  <div class="stats-grid">
    <article>
      <h3>Total Tenants</h3>
      <p class="metric">{{ .TenantCount }}</p>
    </article>
    <article>
      <h3>Total Memories</h3>
      <p class="metric">{{ .MemoryCount }}</p>
    </article>
    <article>
      <h3>Top Tenant</h3>
      <p class="metric">{{ .TopTenantID }}</p>
      <p>{{ .TopTenantMem }} memories</p>
    </article>
  </div>
</section>
{{ end }}
