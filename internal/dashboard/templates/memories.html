{{ define "content" }}
<section>
  <h2>Memories</h2>
  <form method="get" action="/dashboard/memories" class="form-grid">
    <label>
      Tenant
      <select name="tenant_id" required>
        <option value="">Select tenant</option>
        {{ range .Tenants }}
        <option value="{{ .ID }}" {{ if eq $.SelectedTenantID .ID }}selected{{ end }}>{{ .ID }} ({{ .Name }})</option>
        {{ end }}
      </select>
    </label>
    <label>
      Search
      <input type="text" name="q" value="{{ .Query }}" placeholder="query text" />
    </label>
    <button type="submit">Load</button>
  </form>

  <form method="post" action="/dashboard/memories" class="form-grid">
    <label>
      Tenant
      <select name="tenant_id" required>
        <option value="">Select tenant</option>
        {{ range .Tenants }}
        <option value="{{ .ID }}" {{ if eq $.SelectedTenantID .ID }}selected{{ end }}>{{ .ID }} ({{ .Name }})</option>
        {{ end }}
      </select>
    </label>
    <label>
      Tier
      <select name="tier">
        <option value="auto">auto</option>
        <option value="semantic">semantic</option>
        <option value="episodic">episodic</option>
        <option value="working">working</option>
      </select>
    </label>
    <label class="full">
      Content
      <textarea name="content" rows="3" required></textarea>
    </label>
    <label>
      Tags (comma separated)
      <input type="text" name="tags" placeholder="preferences, profile" />
    </label>
    <button type="submit">Store Memory</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Content</th>
        <th>Tier</th>
        <th>Importance</th>
        <th>Updated</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {{ range .Memories }}
      <tr>
        <td><code>{{ .ID }}</code></td>
        <td>{{ .Content }}</td>
        <td>{{ .Tier }}</td>
        <td>{{ .Importance }}</td>
        <td>{{ .UpdatedAt }}</td>
        <td>
          <form method="post" action="/dashboard/memories/{{ .ID }}/delete">
            <input type="hidden" name="tenant_id" value="{{ .TenantID }}" />
            <button type="submit" class="danger">Delete</button>
          </form>
        </td>
      </tr>
      {{ else }}
      <tr><td colspan="6">No memories found.</td></tr>
      {{ end }}
    </tbody>
  </table>
</section>
{{ end }}
