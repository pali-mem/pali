server:
  host: 127.0.0.1
  port: 8080

vector_backend: sqlite
entity_fact_backend: sqlite
default_tenant_id: ""
importance_scorer: heuristic

postprocess:
  enabled: true
  poll_interval_ms: 250
  batch_size: 32
  worker_count: 2
  lease_ms: 30000
  max_attempts: 5
  retry_base_ms: 500
  retry_max_ms: 60000

structured_memory:
  enabled: false
  dual_write_observations: false
  dual_write_events: false
  max_observations: 3

retrieval:
  scoring:
    algorithm: wal
    wal:
      recency: 0.1
      relevance: 0.8
      importance: 0.1
    match:
      recency: 0.05
      relevance: 0.70
      importance: 0.10
      query_overlap: 0.10
      routing: 0.05

parser:
  enabled: false
  provider: heuristic
  ollama_base_url: http://127.0.0.1:11434
  ollama_model: deepseek-r1:7b
  ollama_timeout_ms: 20000
  store_raw_turn: true
  max_facts: 4
  dedupe_threshold: 0.88
  update_threshold: 0.94

database:
  sqlite_dsn: file:pali.db?cache=shared

qdrant:
  base_url: http://127.0.0.1:6333
  api_key: ""
  collection: pali_memories
  timeout_ms: 2000

neo4j:
  uri: bolt://127.0.0.1:7687
  username: neo4j
  password: ""
  database: neo4j
  timeout_ms: 2000
  batch_size: 256

embedding:
  provider: openrouter
  fallback_provider: lexical
  ollama_base_url: http://127.0.0.1:11434
  ollama_model: mxbai-embed-large
  ollama_timeout_seconds: 10
  model_path: ./models/all-MiniLM-L6-v2/model.onnx
  tokenizer_path: ./models/all-MiniLM-L6-v2/tokenizer.json

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key: ""
  embedding_model: openai/text-embedding-3-small:nitro
  scoring_model: openai/gpt-oss-120b:nitro
  timeout_ms: 10000

ollama:
  base_url: http://127.0.0.1:11434
  model: deepseek-r1:7b
  timeout_ms: 2000

auth:
  enabled: false
  jwt_secret: ""
  issuer: pali

logging:
  dev_verbose: false
  progress: true
