name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (example: v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: build-and-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${version}" ]]; then
            echo "ERROR: release version/tag is empty"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git rev-parse "refs/tags/${version}" >/dev/null 2>&1 || {
            echo "ERROR: tag not found: ${version}"
            exit 1
          }

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/release_assets.sh --version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/releases/${{ steps.version.outputs.version }}/artifacts/*
            dist/releases/${{ steps.version.outputs.version }}/SHA256SUMS
            dist/releases/${{ steps.version.outputs.version }}/manifest.json
