name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (example: v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: build-and-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${version}" ]]; then
            echo "ERROR: release version/tag is empty"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git rev-parse "refs/tags/${version}" >/dev/null 2>&1 || {
            echo "ERROR: tag not found: ${version}"
            exit 1
          }

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/release_assets.sh --version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/releases/${{ steps.version.outputs.version }}/artifacts/*
            dist/releases/${{ steps.version.outputs.version }}/SHA256SUMS
            dist/releases/${{ steps.version.outputs.version }}/manifest.json

  publish-container:
    name: publish-container
    needs: build-and-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${version}" ]]; then
            echo "ERROR: release version/tag is empty"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1 || {
            echo "ERROR: tag not found: ${{ steps.version.outputs.version }}"
            exit 1
          }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            REVISION=${{ steps.version.outputs.revision }}
            CREATED=${{ steps.version.outputs.created }}
