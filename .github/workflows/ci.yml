name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-freshness:
    name: docs-freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Check docs freshness
        run: bash ./scripts/check_docs_freshness.sh

  test:
    name: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run unit tests
        run: go test ./internal/... ./pkg/... ./cmd/...

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run integration tests
        run: go test -tags integration ./test/integration/...
        env:
          PALI_VECTOR_BACKEND: sqlite
          PALI_EMBEDDING_PROVIDER: lexical

  test-e2e:
    name: test-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run e2e tests
        run: go test -tags e2e ./test/e2e/...

  release-hygiene:
    name: release-hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Sweep repo artifacts
        run: bash ./scripts/dead_code_sweep.sh
      - name: Verify documented examples
        run: bash ./scripts/verify_docs_examples.sh

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build
        run: go build ./cmd/pali

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: DOCKER_BUILDKIT=1 docker build -t pali:test .
      - name: Validate Compose stacks
        run: |
          docker compose -f deploy/docker/compose.yaml config >/dev/null
          docker compose -f deploy/docker/compose.yaml -f deploy/docker/compose.qdrant.yaml config >/dev/null
          docker compose -f deploy/docker/compose.yaml -f deploy/docker/compose.neo4j.yaml config >/dev/null
          docker compose -f deploy/docker/compose.yaml -f deploy/docker/compose.ollama.yaml config >/dev/null
