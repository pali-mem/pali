version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Python SDK (pali-mem/pali-py) and JS SDK (pali-mem/pali-js) are separate repos.
  # Add a .github/dependabot.yml to each of those repos with their own pip/npm entries.
