version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        - name: exported
        - name: package-comments

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
