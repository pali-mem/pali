services:
  pali:
    environment:
      PALI_ENTITY_FACT_BACKEND: neo4j
      PALI_NEO4J_URI: bolt://neo4j:7687
      PALI_NEO4J_USERNAME: neo4j
      PALI_NEO4J_PASSWORD: ${PALI_NEO4J_PASSWORD:-change-me}
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_BIND_PORT:-7474}:7474"
      - "${NEO4J_BOLT_BIND_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${PALI_NEO4J_PASSWORD:-change-me}
      PALI_NEO4J_PASSWORD: ${PALI_NEO4J_PASSWORD:-change-me}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${PALI_NEO4J_PASSWORD}\" 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  neo4j-data:
