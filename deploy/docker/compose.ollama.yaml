services:
  pali:
    environment:
      PALI_EMBEDDING_OLLAMA_BASE_URL: http://ollama:11434
      PALI_OLLAMA_BASE_URL: http://ollama:11434
      PALI_PARSER_OLLAMA_BASE_URL: http://ollama:11434
      PALI_RETRIEVAL_MULTI_HOP_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_BIND_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  ollama-data:
